# Semgrep GitHub Actions Workflow
# Purpose: Scan pull requests for security vulnerabilities and code quality issues
# This workflow runs on every pull request to provide immediate feedback
#
# Key features:
# - Diff-aware scanning (only checks changed files in PRs for speed)
# - Uploads results to GitHub Security tab (SARIF format)
# - Skips dependabot PRs to avoid permission errors
# - Uses p/default ruleset (600 high-confidence rules from Semgrep team)
#
# For more info: https://semgrep.dev/docs/semgrep-ci/

name: Semgrep

on:
  # Scan pull requests (diff-aware - faster)
  pull_request:
    paths:
      # Only run on Python, JavaScript, CSS, HTML, Shell, and config files
      - '**.py'
      - '**.js'
      - '**.css'
      - '**.html'
      - '**.sh'
      - '**.yaml'
      - '**.yml'
      - '**.json'
      - 'requirements.txt'
      - '.github/workflows/**'
  
  # Scan on-demand via manual trigger
  workflow_dispatch:

  # Optional: Schedule weekly full scans at 2am UTC every Monday
  # Uncomment to enable:
  # schedule:
  #   - cron: '0 2 * * 1'

jobs:
  semgrep:
    name: Semgrep Scan
    # Skip PR scans from dependabot to prevent permission errors
    if: (github.actor != 'dependabot[bot]')
    runs-on: ubuntu-latest
    
    # Required permissions for GitHub Security tab upload
    permissions:
      contents: read      # Read repository contents
      security-events: write  # Upload SARIF results to Security tab
      actions: read       # Read workflow information

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Run Semgrep scan using direct CLI (more reliable)
      - name: Run Semgrep scan
        run: |
          pip install semgrep
          semgrep ci --config=p/security-audit --config=p/owasp-top-ten --sarif --output=semgrep.sarif
        continue-on-error: true
        env:
          SEMGREP_DISABLE_VERSION_CHECK: 'true'

      # Step 3: Upload results to GitHub Security tab
      # Using v4 (latest version as of June 2025)
      - name: Upload SARIF results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
          wait-for-processing: true

      # Step 4: Comment findings on PR (optional)
      # Uncomment this section to post Semgrep results as a PR comment
      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const semgrepOutput = fs.existsSync('semgrep.sarif') 
              ? JSON.parse(fs.readFileSync('semgrep.sarif', 'utf8')) 
              : { runs: [] };
            
            const results = semgrepOutput.runs[0]?.results || [];
            if (results.length === 0) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ Semgrep scan passed with no findings!'
              });
            }
